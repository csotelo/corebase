services:
  django:
    build:
      target: production
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    environment:
      - DJANGO_ENV=production
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes: []

  celery_worker:
    build:
      target: production
    environment:
      - DJANGO_ENV=production
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes: []

  celery_beat:
    build:
      target: production
    environment:
      - DJANGO_ENV=production
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes: []

  vue:
    build:
      target: production
    command: nginx -g "daemon off;"
    ports:
      - "${VUE_PORT:-80}:80"
    volumes: []
    environment: []
